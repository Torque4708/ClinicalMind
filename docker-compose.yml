services:
  # ── PostgreSQL with pgvector ────────────────────────────────────────
  postgres:
    image: ankane/pgvector:latest
    container_name: clinicalmind_postgres
    environment:
      POSTGRES_USER: clinicalmind
      POSTGRES_PASSWORD: clinicalmind
      POSTGRES_DB: clinicalmind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U clinicalmind -d clinicalmind" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: clinicalmind_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: clinicalmind_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://clinicalmind:clinicalmind@postgres:5432/clinicalmind
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    restart: unless-stopped

  # ── Celery Worker ───────────────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: clinicalmind_celery_worker
    command: celery -A backend.tasks.etl_tasks.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://clinicalmind:clinicalmind@postgres:5432/clinicalmind
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    restart: unless-stopped

  # ── Celery Beat Scheduler ───────────────────────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: clinicalmind_celery_beat
    command: celery -A backend.tasks.etl_tasks.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://clinicalmind:clinicalmind@postgres:5432/clinicalmind
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    restart: unless-stopped

  # ── Streamlit Frontend ──────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: clinicalmind_frontend
    env_file:
      - .env
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
